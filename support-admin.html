<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla Broker — Admin Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" type="image/svg+xml" href="images/Logo.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:      #3d6ff8;
  --blue-deep: #2554e0;
  --red:       #e31937;
  --dark:      #0a0d14;
  --dark2:     #0d1220;
  --border:    rgba(255,255,255,0.08);
  --surface:   rgba(255,255,255,0.04);
  --white:     #ffffff;
  --success:   #16a34a;
  --warn:      #d97706;
  --font-serif:'Cormorant Garamond', Georgia, serif;
  --font-sans: 'Outfit', sans-serif;
  --ease:      cubic-bezier(0.4,0,0.2,1);
  --spring:    cubic-bezier(0.34,1.56,0.64,1);
}
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font-sans); background: var(--dark); color: var(--white); display: flex; flex-direction: column; }

/* ── HEADER ── */
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; flex-shrink: 0; background: rgba(10,13,20,0.97); border-bottom: 1px solid var(--border); }
.header-left { display: flex; align-items: center; gap: 10px; }
.header-brand { display: flex; align-items: center; gap: 9px; text-decoration: none; }
.header-logo { height: 20px; filter: invert(1); }
.header-logo-text { font-size: 0.88rem; font-weight: 700; color: white; letter-spacing: 0.16em; text-transform: uppercase; }
.admin-badge { font-size: 0.62rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; background: rgba(227,25,55,0.15); color: var(--red); letter-spacing: 0.1em; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 8px; }
.btn-link { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 7px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); font-size: 0.72rem; font-weight: 600; color: rgba(255,255,255,0.6); text-decoration: none; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.btn-link:hover { background: rgba(255,255,255,0.1); color: white; }
.btn-link svg { width: 12px; height: 12px; flex-shrink: 0; }

.tickets-toggle { display: none; width: 36px; height: 36px; border-radius: 8px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.65); transition: all 0.2s; flex-shrink: 0; position: relative; }
.tickets-toggle:hover { background: rgba(255,255,255,0.12); color: white; }
.tickets-toggle svg { width: 16px; height: 16px; }
.toggle-badge { position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; border-radius: 50%; background: var(--red); font-size: 0.6rem; font-weight: 700; color: white; display: none; align-items: center; justify-content: center; }
.toggle-badge.show { display: flex; }

/* ── LAYOUT ── */
.app-body { flex: 1; display: flex; overflow: hidden; position: relative; }

/* ── CONTACT LIST (WhatsApp-style) ── */
.ticket-list { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: rgba(10,13,20,0.9); transition: transform 0.35s var(--ease); }
.list-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.list-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.list-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
.list-close { display: none; width: 28px; height: 28px; border-radius: 7px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.5); transition: all 0.2s; }
.list-close:hover { background: rgba(255,255,255,0.12); color: white; }
.list-close svg { width: 13px; height: 13px; }
.list-filters { display: flex; gap: 5px; }
.filter-btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: none; font-family: var(--font-sans); font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.35); cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em; }
.filter-btn:hover { color: white; border-color: rgba(255,255,255,0.2); }
.filter-btn.active { background: rgba(61,111,248,0.15); border-color: var(--blue); color: var(--blue); }

.tickets-scroll { flex: 1; overflow-y: auto; }
.tickets-scroll::-webkit-scrollbar { width: 3px; }
.tickets-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

/* ── CONTACT CARD (WhatsApp-style) ── */
.contact-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s; position: relative;
}
.contact-item:hover { background: rgba(255,255,255,0.03); }
.contact-item.active { background: rgba(61,111,248,0.08); border-left: 3px solid var(--blue); padding-left: 13px; }
.contact-item.unread::after { content: ''; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--blue); }

.contact-avatar {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 700; color: white;
  background: linear-gradient(135deg, rgba(61,111,248,0.5), rgba(37,84,224,0.6));
}
.contact-avatar.guest {
  background: linear-gradient(135deg, rgba(120,120,140,0.5), rgba(80,80,100,0.6));
}

.contact-details { flex: 1; min-width: 0; }
.contact-name-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 2px; }
.contact-name { font-size: 0.88rem; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.contact-time { font-size: 0.62rem; color: rgba(255,255,255,0.25); flex-shrink: 0; }

.contact-email { font-size: 0.72rem; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }

.contact-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.service-tag { display: inline-flex; font-size: 0.62rem; font-weight: 600; padding: 2px 6px; border-radius: 5px; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.45); letter-spacing: 0.03em; }
.status-pill { font-size: 0.58rem; font-weight: 700; padding: 2px 6px; border-radius: 99px; letter-spacing: 0.06em; text-transform: uppercase; }
.status-pill.open { background: rgba(34,197,94,0.12); color: #22c55e; }
.status-pill.closed { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); }
/* "Not a user" label */
.guest-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 0.58rem; font-weight: 700; padding: 2px 6px; border-radius: 99px; letter-spacing: 0.05em; text-transform: uppercase; background: rgba(217,119,6,0.12); color: #fbbf24; }
.guest-badge svg { width: 9px; height: 9px; }

.list-empty { padding: 40px 16px; text-align: center; font-size: 0.8rem; color: rgba(255,255,255,0.2); display: none; }
.list-empty.show { display: block; }
.list-empty svg { width: 32px; height: 32px; margin: 0 auto 10px; opacity: 0.2; display: block; }

/* ── CHAT PANEL ── */
.chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.chat-empty-admin { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: rgba(255,255,255,0.15); padding: 40px; }
.chat-empty-admin svg { width: 48px; height: 48px; opacity: 0.2; }
.chat-empty-admin h3 { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 300; color: rgba(255,255,255,0.25); }
.chat-empty-admin p { font-size: 0.78rem; text-align: center; max-width: 200px; line-height: 1.6; }

.chat-topbar { display: none; padding: 11px 16px; flex-shrink: 0; border-bottom: 1px solid var(--border); align-items: center; gap: 10px; background: rgba(10,13,20,0.7); }
.chat-topbar.show { display: flex; }

.back-to-list { display: none; width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; background: rgba(255,255,255,0.06); border: 1px solid var(--border); align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.6); transition: all 0.2s; }
.back-to-list svg { width: 14px; height: 14px; }
.back-to-list:hover { background: rgba(255,255,255,0.12); color: white; }

.topbar-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; background: rgba(61,111,248,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; color: var(--blue); }
.topbar-avatar.guest { background: rgba(120,120,140,0.25); color: rgba(255,255,255,0.5); }
.ticket-user-info { flex: 1; min-width: 0; }
.topbar-name { font-size: 0.88rem; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-sub { font-size: 0.68rem; color: rgba(255,255,255,0.35); display: flex; align-items: center; gap: 6px; }
.topbar-guest-badge { display: inline-flex; align-items: center; gap: 2px; font-size: 0.58rem; font-weight: 700; padding: 1px 5px; border-radius: 99px; background: rgba(217,119,6,0.15); color: #fbbf24; text-transform: uppercase; letter-spacing: 0.05em; }

.topbar-actions { display: flex; gap: 6px; flex-shrink: 0; }
.action-btn { padding: 5px 11px; border-radius: 7px; border: 1px solid var(--border); background: none; font-family: var(--font-sans); font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.45); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.action-btn:hover { color: white; border-color: rgba(255,255,255,0.2); }
.action-btn.close-btn:hover { background: rgba(227,25,55,0.1); border-color: var(--red); color: var(--red); }
.action-btn.email-btn:hover { background: rgba(61,111,248,0.1); border-color: var(--blue); color: var(--blue); }
.action-btn .btn-label { }
.action-btn .btn-icon { display: none; }

.messages-wrap { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.messages-wrap::-webkit-scrollbar { width: 4px; }
.messages-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

.msg { display: flex; gap: 8px; max-width: 78%; animation: msgIn 0.3s var(--spring) both; }
@keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.msg.admin-out { align-self: flex-end; flex-direction: row-reverse; }
.msg.user-in, .msg.bot-in { align-self: flex-start; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.62rem; font-weight: 700; margin-top: 2px; }
.msg.admin-out .msg-avatar { background: linear-gradient(135deg, #e31937,#c0142e); color: white; }
.msg.user-in .msg-avatar { background: rgba(61,111,248,0.2); color: var(--blue); }
.msg.bot-in .msg-avatar { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); }
.msg-body { display: flex; flex-direction: column; gap: 3px; }
.msg.admin-out .msg-body { align-items: flex-end; }
.msg-bubble { padding: 9px 13px; border-radius: 14px; font-size: 0.84rem; line-height: 1.6; font-weight: 300; word-break: break-word; }
.msg.admin-out .msg-bubble { background: var(--red); color: white; border-bottom-right-radius: 4px; }
.msg.user-in .msg-bubble { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.bot-in .msg-bubble { background: rgba(61,111,248,0.07); color: rgba(255,255,255,0.5); border: 1px solid rgba(61,111,248,0.12); border-bottom-left-radius: 4px; font-style: italic; font-size: 0.78rem; }
.msg-time { font-size: 0.62rem; color: rgba(255,255,255,0.2); padding: 0 3px; }

.reply-area { display: none; padding: 12px 16px; flex-shrink: 0; border-top: 1px solid var(--border); background: rgba(10,13,20,0.8); }
.reply-area.show { display: block; }
.reply-row { display: flex; gap: 8px; align-items: flex-end; }
.reply-input { flex: 1; padding: 10px 13px; min-height: 42px; max-height: 110px; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; font-family: var(--font-sans); font-size: 0.88rem; color: white; outline: none; resize: none; transition: border-color 0.2s; scrollbar-width: none; }
.reply-input:focus { border-color: var(--red); background: rgba(227,25,55,0.04); }
.reply-input::placeholder { color: rgba(255,255,255,0.2); }
.reply-btn { width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0; background: var(--red); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: background 0.2s, transform 0.15s; }
.reply-btn:hover { background: #c0142e; transform: scale(1.05); }
.reply-btn:disabled { background: rgba(255,255,255,0.1); cursor: not-allowed; transform: none; }
.reply-btn svg { width: 16px; height: 16px; }
.reply-hint { font-size: 0.65rem; color: rgba(255,255,255,0.18); margin-top: 6px; }

/* Email modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.show { display: flex; }
.modal { width: 100%; max-width: 460px; background: #0d1220; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; animation: modalIn 0.3s var(--spring) both; }
@keyframes modalIn { from { opacity:0; transform:scale(0.94); } to { opacity:1; transform:scale(1); } }
.modal-title { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 400; margin-bottom: 5px; }
.modal-sub { font-size: 0.8rem; color: rgba(255,255,255,0.35); margin-bottom: 18px; font-weight: 300; }
.modal-field { margin-bottom: 12px; }
.modal-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px; display: block; }
.modal-input, .modal-textarea { width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 8px; font-family: var(--font-sans); font-size: 0.84rem; color: white; outline: none; transition: border-color 0.2s; }
.modal-input:focus, .modal-textarea:focus { border-color: var(--blue); }
.modal-textarea { resize: vertical; min-height: 90px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
.modal-cancel { padding: 8px 16px; border-radius: 8px; background: none; border: 1px solid var(--border); font-family: var(--font-sans); font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.45); cursor: pointer; transition: all 0.2s; }
.modal-cancel:hover { color: white; border-color: rgba(255,255,255,0.2); }
.modal-send { padding: 8px 20px; border-radius: 8px; background: var(--blue); border: none; font-family: var(--font-sans); font-size: 0.8rem; font-weight: 700; color: white; cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s; position: relative; }
.modal-send:hover { background: var(--blue-deep); }
.modal-send.loading span { opacity: 0; }
.modal-send.loading::after { content:''; position:absolute; width:14px; height:14px; top:50%; left:50%; transform:translate(-50%,-50%); border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); padding: 9px 18px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; color: white; opacity: 0; pointer-events: none; transition: all 0.3s var(--ease); z-index: 9999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: rgba(22,163,74,0.9); }
.toast.error   { background: rgba(227,25,55,0.9); }

.list-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9; }
.list-backdrop.show { display: block; }

/* ══════════════════════════════
   MOBILE
══════════════════════════════ */
@media (max-width: 750px) {
  .header { padding: 11px 14px; }
  #openCount { display: none; }
  .tickets-toggle { display: flex; }
  .btn-link .btn-text { display: none; }
  .btn-link { padding: 7px 10px; font-size: 0; }
  .btn-link svg { width: 14px; height: 14px; }
  .ticket-list { position: fixed; top: 0; left: 0; bottom: 0; width: 300px; z-index: 10; transform: translateX(-100%); box-shadow: 4px 0 24px rgba(0,0,0,0.4); }
  .ticket-list.mobile-open { transform: translateX(0); }
  .list-close { display: flex; }
  .chat-panel { width: 100%; }
  .back-to-list { display: flex; }
  .action-btn .btn-label { display: none; }
  .action-btn .btn-icon { display: inline; }
  .action-btn { padding: 7px 9px; font-size: 0.85rem; }
  .msg { max-width: 86%; }
  .reply-hint { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button class="tickets-toggle" id="ticketsToggle" aria-label="Open tickets">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="toggle-badge" id="toggleBadge">0</span>
    </button>
    <a class="header-brand" href="admin.html">
      <img class="header-logo" src="images/tesla logo.png" alt="Tesla"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="header-logo-text" style="display:none">TESLA</span>
    </a>
    <span class="admin-badge">Support</span>
  </div>
  <div class="header-right">
    <span style="font-size:0.78rem;color:rgba(255,255,255,0.35);" id="openCount">Loading…</span>
    <a href="admin.html" class="btn-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      <span class="btn-text">Admin Dashboard</span>
    </a>
  </div>
</header>

<div class="app-body">

  <!-- CONTACT LIST SIDEBAR -->
  <div class="ticket-list" id="ticketList">
    <div class="list-header">
      <div class="list-header-row">
        <div class="list-title">Live Chats</div>
        <button class="list-close" id="listClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="list-filters">
        <button class="filter-btn active" data-filter="open">Open</button>
        <button class="filter-btn" data-filter="closed">Closed</button>
        <button class="filter-btn" data-filter="all">All</button>
      </div>
    </div>
    <div class="tickets-scroll" id="ticketsScroll">
      <div class="list-empty show" id="listEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Loading chats…
      </div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel" id="chatPanel">

    <div class="chat-empty-admin" id="adminChatEmpty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <h3>Select a chat</h3>
      <p>Choose a conversation from the list to view and reply.</p>
    </div>

    <div class="chat-topbar" id="chatTopbar">
      <button class="back-to-list" id="backToList" aria-label="Back to chats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div class="topbar-avatar" id="topbarAvatar">U</div>
      <div class="ticket-user-info">
        <div class="topbar-name" id="topbarName">—</div>
        <div class="topbar-sub">
          <span id="topbarSub">—</span>
          <span class="topbar-guest-badge" id="topbarGuestBadge" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Not a user
          </span>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="action-btn email-btn" id="emailUserBtn">
          <span class="btn-label">✉ Email User</span>
          <span class="btn-icon">✉</span>
        </button>
        <button class="action-btn close-btn" id="closeTicketBtn">
          <span class="btn-label">✕ Close Ticket</span>
          <span class="btn-icon">✕</span>
        </button>
      </div>
    </div>

    <div class="messages-wrap" id="messagesWrap"></div>

    <div class="reply-area" id="replyArea">
      <div class="reply-row">
        <textarea class="reply-input" id="replyInput" placeholder="Reply to user…" rows="1"></textarea>
        <button class="reply-btn" id="replyBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <p class="reply-hint">Enter to send · Shift+Enter for new line. User sees your reply instantly.</p>
    </div>

  </div>
</div>

<div class="list-backdrop" id="listBackdrop"></div>

<!-- EMAIL USER MODAL -->
<div class="modal-overlay" id="emailModal">
  <div class="modal">
    <h2 class="modal-title">Email User</h2>
    <p class="modal-sub" id="emailModalSub">Send an email directly to the user's inbox</p>
    <div class="modal-field">
      <label class="modal-label">To</label>
      <input class="modal-input" id="emailTo" readonly>
    </div>
    <div class="modal-field">
      <label class="modal-label">Subject</label>
      <input class="modal-input" id="emailSubject" placeholder="Re: Your support ticket">
    </div>
    <div class="modal-field">
      <label class="modal-label">Message</label>
      <textarea class="modal-textarea" id="emailBody" placeholder="Type your email message…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" id="emailModalCancel">Cancel</button>
      <button class="modal-send" id="emailModalSend"><span>Send Email</span></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="sdk.js"></script>
<script src="appwrite.js"></script>
<script>
/* ─── STATE ─── */
let allTickets     = [];
let activeTicketId = null;
let activeTicket   = null;
let unsubscribe    = null;
let pollTimer      = null;
let currentFilter  = 'open';
const renderedIds  = new Set();

/* ─── INIT ─── */
(async () => {
  const u = await getCurrentUser().catch(() => null);
  if (!u || u.email !== ADMIN_EMAIL) {
    window.location.href = 'auth.html';
    return;
  }
  await loadTickets();
  // Only refreshes the contacts list — does NOT render messages (that's polling's job)
  subscribeToAllTickets(() => loadTickets(true));
})();

/* ─── ADMIN-SIDE POLLING (3 s) ─── */
function startPoll() {
  stopPoll();
  if (!activeTicketId) return;
  pollTimer = setInterval(async () => {
    if (!activeTicketId) return;
    try {
      const msgs = await getSupportMessages(activeTicketId);
      msgs.forEach(m => {
        if (!renderedIds.has(m.$id)) {
          renderedIds.add(m.$id);
          renderMessage(m);
        }
      });
    } catch (_) {}
  }, 3000);
}
function stopPoll() { clearInterval(pollTimer); pollTimer = null; }

/* ─── LOAD TICKETS ─── */
async function loadTickets(silent = false) {
  try {
    allTickets = await getAllSupportTickets();
    renderTicketList();
    const open = allTickets.filter(t => t.status === 'open').length;
    document.getElementById('openCount').textContent = `${open} open chat${open !== 1 ? 's' : ''}`;
    updateToggleBadge(open);
    if (!silent) {
      document.getElementById('listEmpty').textContent = allTickets.length === 0 ? 'No chats yet.' : '';
      document.getElementById('listEmpty').classList.toggle('show', allTickets.length === 0);
    }
  } catch (e) { console.error(e); }
}

/* ─── RENDER CONTACT LIST ─── */
function renderTicketList() {
  const container = document.getElementById('ticketsScroll');
  const filtered  = allTickets.filter(t => currentFilter === 'all' ? true : t.status === currentFilter);
  container.querySelectorAll('.contact-item').forEach(el => el.remove());

  const empty = document.getElementById('listEmpty');
  if (filtered.length === 0) {
    empty.textContent = `No ${currentFilter === 'all' ? '' : currentFilter + ' '}chats.`;
    empty.classList.add('show');
    return;
  }
  empty.classList.remove('show');

  filtered.forEach(ticket => {
    const displayName = (ticket.userName && ticket.userName.trim()) ? ticket.userName.trim() : ticket.email;
    const initial     = (displayName[0] || '?').toUpperCase();
    const timeAgo     = timeSince(ticket.$createdAt);

    const div = document.createElement('div');
    div.className = 'contact-item' + (ticket.$id === activeTicketId ? ' active' : '');
    div.dataset.id = ticket.$id;
    div.innerHTML = `
      <div class="contact-avatar">${initial}</div>
      <div class="contact-details">
        <div class="contact-name-row">
          <span class="contact-name">${escH(displayName)}</span>
          <span class="contact-time">${timeAgo}</span>
        </div>
        <div class="contact-email">${escH(ticket.email)}</div>
        <div class="contact-meta">
          <span class="status-pill ${ticket.status}">${ticket.status}</span>
        </div>
      </div>`;
    div.addEventListener('click', () => openTicket(ticket));
    container.appendChild(div);
  });
}

/* ─── OPEN TICKET ─── */
async function openTicket(ticket) {
  stopPoll();
  if (unsubscribe) { try { unsubscribe(); } catch {} unsubscribe = null; }

  activeTicketId = ticket.$id;
  activeTicket   = ticket;
  renderedIds.clear();

  const displayName = (ticket.userName && ticket.userName.trim()) ? ticket.userName.trim() : ticket.email;

  document.getElementById('adminChatEmpty').style.display = 'none';
  document.getElementById('chatTopbar').classList.add('show');
  document.getElementById('replyArea').classList.add('show');

  const av = document.getElementById('topbarAvatar');
  av.textContent = (displayName[0] || 'U').toUpperCase();
  av.className   = 'topbar-avatar';

  document.getElementById('topbarName').textContent = displayName;
  document.getElementById('topbarSub').textContent  = `${ticket.email} · ${ticket.status}`;

  const guestBadge = document.getElementById('topbarGuestBadge');
  if (guestBadge) guestBadge.style.display = 'none';

  document.getElementById('closeTicketBtn').textContent =
    ticket.status === 'open' ? '✕ Close Ticket' : '↩ Reopen Ticket';

  document.querySelectorAll('.contact-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === ticket.$id));

  // Load history
  const wrap = document.getElementById('messagesWrap');
  wrap.innerHTML = '';
  try {
    const msgs = await getSupportMessages(ticket.$id);
    msgs.forEach(m => { renderedIds.add(m.$id); renderMessage(m); });
    scrollBottom();
  } catch (e) { console.error(e); }

  // Realtime (instant when it works)
  try {
    unsubscribe = subscribeToTicket(ticket.$id, newMsg => {
      if (!renderedIds.has(newMsg.$id)) {
        renderedIds.add(newMsg.$id);
        renderMessage(newMsg);
      }
    });
  } catch (_) {}

  // Polling fallback (guarantees delivery)
  startPoll();

  document.getElementById('emailTo').value      = ticket.email;
  document.getElementById('emailSubject').value = `Re: Your Tesla Broker support ticket`;

  if (window.innerWidth <= 750) closeTicketList();
}

/* ─── RENDER MESSAGE ─── */
function renderMessage(msg) {
  const wrap     = document.getElementById('messagesWrap');
  const cssClass = msg.sender === 'admin' ? 'admin-out' : msg.sender === 'bot' ? 'bot-in' : 'user-in';
  const avatar   = msg.sender === 'admin' ? 'TB' : msg.sender === 'bot' ? '🤖' : (msg.senderName?.[0] || 'U').toUpperCase();
  const timeStr  = msg.$createdAt
    ? new Date(msg.$createdAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})
    : new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  const div = document.createElement('div');
  div.className = `msg ${cssClass}`;
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      <div class="msg-bubble">${escH(msg.message)}</div>
      <div class="msg-time">${timeStr}</div>
    </div>`;
  wrap.appendChild(div);
  scrollBottom();
}

/* ─── REPLY ─── */
async function sendReply() {
  const input = document.getElementById('replyInput');
  const text  = input.value.trim();
  if (!text || !activeTicketId) return;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('replyBtn').disabled = true;

  // Optimistic render
  renderMessage({ sender:'admin', message:text, $createdAt: new Date().toISOString() });

  try {
    const saved = await sendSupportMessage({
      ticketId:   activeTicketId,
      sender:     'admin',
      message:    text,
      senderName: 'Tesla Broker Support',
    });
    if (saved?.$id) renderedIds.add(saved.$id);
  } catch (_) { showToast('Failed to send', 'error'); }
}

document.getElementById('replyBtn').addEventListener('click', sendReply);
document.getElementById('replyInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  document.getElementById('replyBtn').disabled = this.value.trim() === '';
});
document.getElementById('replyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
});

/* ─── CLOSE / REOPEN ─── */
document.getElementById('closeTicketBtn').addEventListener('click', async () => {
  if (!activeTicket) return;
  const ns = activeTicket.status === 'open' ? 'closed' : 'open';
  try {
    await updateTicketStatus(activeTicketId, ns);
    activeTicket.status = ns;
    document.getElementById('topbarSub').textContent = `${activeTicket.email} · ${ns}`;
    document.getElementById('closeTicketBtn').textContent = ns === 'open' ? '✕ Close Ticket' : '↩ Reopen Ticket';
    await loadTickets(true);
    showToast(`Ticket ${ns}`, 'success');
  } catch (_) { showToast('Failed to update ticket', 'error'); }
});

/* ─── EMAIL MODAL ─── */
document.getElementById('emailUserBtn').addEventListener('click', () => {
  document.getElementById('emailModal').classList.add('show');
  document.getElementById('emailBody').focus();
});
document.getElementById('emailModalCancel').addEventListener('click', () => {
  document.getElementById('emailModal').classList.remove('show');
});
document.getElementById('emailModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
});
document.getElementById('emailModalSend').addEventListener('click', async () => {
  const to      = document.getElementById('emailTo').value;
  const subject = document.getElementById('emailSubject').value.trim();
  const body    = document.getElementById('emailBody').value.trim();
  if (!subject || !body) { showToast('Fill in subject and message', 'error'); return; }
  const btn = document.getElementById('emailModalSend');
  btn.classList.add('loading');
  try {
    const msgText = `📧 Email sent to ${to}:\n\n${body}`;
    const saved   = await sendSupportMessage({ ticketId:activeTicketId, sender:'admin', message:msgText, senderName:'Tesla Broker Support' });
    if (saved?.$id) renderedIds.add(saved.$id);
    renderMessage({ sender:'admin', message:msgText, $createdAt: new Date().toISOString() });
    btn.classList.remove('loading');
    document.getElementById('emailModal').classList.remove('show');
    document.getElementById('emailBody').value = '';
    showToast('Email note saved to chat', 'success');
  } catch (_) { btn.classList.remove('loading'); showToast('Failed to send', 'error'); }
});

/* ─── FILTERS ─── */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTicketList();
  });
});

/* ─── HELPERS ─── */
function scrollBottom() { const w = document.getElementById('messagesWrap'); w.scrollTop = w.scrollHeight; }
function escH(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function timeSince(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60)    return 'just now';
  if (s < 3600)  return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function openTicketList() {
  document.getElementById('ticketList').classList.add('mobile-open');
  document.getElementById('listBackdrop').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeTicketList() {
  document.getElementById('ticketList').classList.remove('mobile-open');
  document.getElementById('listBackdrop').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('ticketsToggle').addEventListener('click', openTicketList);
document.getElementById('listClose').addEventListener('click', closeTicketList);
document.getElementById('listBackdrop').addEventListener('click', closeTicketList);
document.getElementById('backToList').addEventListener('click', openTicketList);

function updateToggleBadge(count) {
  const b = document.getElementById('toggleBadge');
  b.textContent = count > 9 ? '9+' : count;
  b.classList.toggle('show', count > 0);
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

window.addEventListener('beforeunload', stopPoll);
</script>
</body>
</html>
